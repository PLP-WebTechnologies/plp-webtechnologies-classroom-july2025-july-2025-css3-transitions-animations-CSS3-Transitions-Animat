<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 7 Assignment - CSS & JS Animations</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Bringing Web Pages to Life</h1>
    <p>A demo of CSS animations + JavaScript functions</p>
  </header>

  <!-- Part 1: CSS Animations -->
  <section id="part1">
    <h2>Part 1: CSS Transitions & Keyframes</h2>
    <button class="hover-btn">Hover Me 🎨</button>
    <div class="animated-box"></div>
  </section>

  <!-- Part 2: JavaScript Functions -->
  <section id="part2">
    <h2>Part 2: JavaScript Functions</h2>
    <button onclick="showRandomNumber()">Generate Random Number 🎲</button>
    <p id="randomOutput">Your number will appear here...</p>
  </section>

  <!-- Part 3: Combining CSS + JS -->
  <section id="part3">
    <h2>Part 3: Combining CSS & JavaScript</h2>
    <button onclick="triggerBoxAnimation()">Animate the Box 📦</button>
    <div id="jsBox" class="js-box"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
