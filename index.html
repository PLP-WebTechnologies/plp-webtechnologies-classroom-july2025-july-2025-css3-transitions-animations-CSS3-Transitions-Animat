<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive CSS + JavaScript Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1> Interactive Web Page </h1>

  <!-- Part 1: Buttons with transitions -->
  <button id="hoverBtn">Hover Me</button>

  <!-- Animated box -->
  <div id="animateBox"></div>

  <!-- Part 3: Button to trigger animation -->
  <button id="triggerBtn">Click to Animate Box</button>

  <!-- Part 3: Modal -->
  <button id="openModal">Open Modal</button>
  <div id="modal" class="hidden">
    <div class="modal-content">
      <p>This is a modal! 🎬</p>
      <button id="closeModal">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
