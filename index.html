<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bringing Web Pages to Life</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>✨ CSS + JavaScript Magic ✨</h1>

  <!-- Part 1: CSS-only animations -->
  <button class="fancy-btn">Hover Me!</button>

  <div class="animated-box"></div>

  <!-- Part 2 & 3: JS Functions + Triggering Animations -->
  <section>
    <button onclick="animateBox()">Click to Animate Box</button>
    <button onclick="toggleModal()">Toggle Modal</button>
  </section>

  <!-- Modal example -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <h2>Hello! 👋</h2>
      <p>This modal slides in with CSS + JavaScript.</p>
      <button onclick="toggleModal()">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
