<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS & JS Interactive Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Interactive Web Page: CSS Animations + JS</h1>
  </header>

  <!-- Part 1: CSS3 Animation Demo -->
  <section id="css-animations">
    <h2>CSS Transitions & Animations</h2>
    <button class="hover-btn">Hover Me!</button>
    <div class="animated-box"></div>
  </section>

  <!-- Part 2: JS Functions -->
  <section id="js-functions">
    <h2>JavaScript Functions & Scope</h2>
    <button id="calculateBtn">Calculate Sum</button>
    <p id="calcOutput"></p>
  </section>

  <!-- Part 3: JS-triggered CSS Animation -->
  <section id="js-animation">
    <h2>Trigger Animation with JS</h2>
    <button id="startAnimationBtn">Animate Box</button>
    <div class="js-animated-box"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
