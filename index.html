<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS transitions & animations | JavaScript</title>
  <link rel="stylesheet" href="styles.css">

</head>
<body>
  <h2>CSS transitions and animations</h2>

  <!-- CSS Animations -->
  <button class="btn1">Hover Me!</button>
  <div class="fade-box">I fade in/out</div>

  <!-- triggers CSS Animation -->
  <button id="animateBtn">Animate Box</button>
  <div id="animBox" class="box"></div>

  <!-- Modal Example -->
  <button id="showModalBtn">Show Modal</button>
  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closeModalBtn" class="close">&times;</span>
      <p>This is a sliding modal!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
