<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 7 Assignment</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>🎬 CSS & JavaScript Interactive Page</h1>

  <!-- Part 1: CSS Animations -->
  <button class="fancy-btn">Hover Me</button>
  <div class="animated-box"></div>
  <p class="fade-in-text">This text fades in!</p>

  <!-- Part 3: Combined Animation -->
  <button id="trigger-btn">Animate Box</button>
  <div id="trigger-box" class="box"></div>

  <!-- Modal Example -->
  <button id="open-modal">Open Modal</button>
  <div id="modal" class="modal">
    <div class="modal-content">
      <p>Hello! I'm a modal with animation 🎉</p>
      <button id="close-modal">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
