<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive CSS & JS Assignment</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Bringing Web Pages to Life 🎬✨</h1>

  <!-- Part 1: CSS Animations -->
  <button id="hoverBtn">Hover Over Me</button>
  <div class="box" id="animatedBox"></div>

  <!-- Part 2 & 3: JS Functions Trigger Animations -->
  <button id="animateBtn">Animate Box</button>
  <button id="flipCardBtn">Flip Card</button>
  
  <div class="card" id="card">
    <div class="card-inner">
      <div class="card-front">Front</div>
      <div class="card-back">Back</div>
    </div>
  </div>

  <!-- Modal -->
  <button id="showModalBtn">Show Modal</button>
  <div class="modal" id="modal">
    <div class="modal-content">
      <span id="closeModalBtn">&times;</span>
      <p>This modal slides in and out!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
