<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS + JavaScript Animations Project</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Interactive Animations Project</h1>

  <!-- ================= Part 1: CSS Transitions & Animations ================= -->
  <section>
    <h2>Part 1: CSS Transitions and Animations</h2>
    
    <!-- Button Hover Effect -->
    <button class="btn-hover">Hover Me</button>

    <!-- Animated Box (CSS @keyframes) -->
    <div class="animated-box"></div>
  </section>

  <hr>

  <!-- ================= Part 2: JavaScript Functions ================= -->
  <section>
    <h2>Part 2: JavaScript Functions</h2>

    <p id="functionOutput"></p>
    <button onclick="showCalculation()">Run Calculation Function</button>
  </section>

  <hr>

  <!-- ================= Part 3: Combining CSS + JavaScript ================= -->
  <section>
    <h2>Part 3: CSS + JavaScript Combined</h2>

    <!-- Button that triggers animation -->
    <button onclick="animateBox()">Animate the Box!</button>
    <div id="jsBox" class="box"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
