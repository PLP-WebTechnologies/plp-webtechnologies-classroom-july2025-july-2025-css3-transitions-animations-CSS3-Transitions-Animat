<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive CSS & JS Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Interactive Web Page Demo ✨</h1>
    </header>

    <!-- Part 1: CSS Hover Animations -->
    <section>
        <h2>Hover Effects with CSS</h2>
        <button class="hover-btn">Hover Me!</button>
        <div class="fade-box">I fade in and out on hover!</div>
    </section>

    <!-- Part 2: JS Functions -->
    <section>
        <h2>JavaScript Functions Demo</h2>
        <p>Click the button to calculate a square of a number:</p>
        <input type="number" id="numberInput" placeholder="Enter a number">
        <button id="calcBtn">Calculate Square</button>
        <p id="calcResult"></p>
    </section>

    <!-- Part 3: JS + CSS Animations -->
    <section>
        <h2>Trigger CSS Animation with JS</h2>
        <div class="box"></div>
        <button id="animateBtn">Animate Box</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
