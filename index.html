<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 CSS & JavaScript Animation Project</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>✨ Interactive Animation Project ✨</h1>

  <!-- Part 1: CSS Animation Demo -->
  <section class="part">
    <h2>🎨 Part 1: CSS Transitions & Animations</h2>
    <button class="animate-btn">Hover Me!</button>
    <div class="animated-box"></div>
  </section>

  <!-- Part 2: JavaScript Functions -->
  <section class="part">
    <h2>📚 Part 2: JavaScript Functions</h2>
    <button onclick="showResult(5, 3)">Calculate (5, 3)</button>
    <p id="result"></p>
  </section>

  <!-- Part 3: Combined JS + CSS -->
  <section class="part">
    <h2>🎬 Part 3: Combine CSS & JavaScript</h2>
    <button id="triggerAnimation">Animate the Box</button>
    <div id="jsBox" class="js-box"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
