<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive CSS + JS Project</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Bringing Web Pages to Life ✨</h1>

  <!-- Part 1: Buttons with hover transition -->
  <button id="hoverBtn">Hover Me</button>

  <!-- Part 2 & 3: Animated box triggered by JS -->
  <div id="animateBox"></div>
  <button id="animateBtn">Animate the Box</button>

  <!-- Example Modal -->
  <button id="showModalBtn">Show Modal</button>
  <div id="modal" class="hidden">
    <div class="modal-content">
      <p>This modal slides in and out 🎬</p>
      <button id="closeModalBtn">Close</button>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
