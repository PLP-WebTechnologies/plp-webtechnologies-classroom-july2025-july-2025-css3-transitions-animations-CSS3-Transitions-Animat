<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Animations</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>CSS & JavaScript Interactive Animations</h1>

    <!-- Part 1: CSS Transitions -->
    <section id="transitions">
        <h2>Hover to Animate</h2>
        <button class="animate-btn">Hover me!</button>
        <div class="box"></div>
    </section>

    <!-- Part 2: JavaScript Functions -->
    <section id="js-functions">
        <h2>JS Functions Demo</h2>
        <button id="calcBtn">Calculate Random Number</button>
        <p id="calcResult"></p>
    </section>

    <!-- Part 3: Trigger CSS Animations with JS -->
    <section id="js-css">
        <h2>Trigger Animations with JS</h2>
        <button id="animateBoxBtn">Animate Box</button>
        <div class="animated-box"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
