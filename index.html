<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bringing Web Pages to Life</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Bringing Web Pages to Life with CSS & JavaScript</h1>

  <!-- Part 1: CSS Animations -->
  <section id="css-animations">
    <h2>CSS3 Transitions and Animations</h2>
    <button class="animated-btn">Hover Me!</button>
  </section>

  <!-- Part 2: JavaScript Functions -->
  <section id="js-functions">
    <h2>JavaScript Functions with Parameters & Return Values</h2>
    <button id="move-btn">Move the Box</button>
    <div class="box"></div>
  </section>

  <!-- Part 3: Combining CSS + JS -->
  <section id="combined">
    <h2>Combined Animation</h2>
    <button id="show-modal-btn">Show Modal</button>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <h3>Hello from the Modal!</h3>
        <p>This animation was triggered by JavaScript.</p>
        <button id="close-modal-btn">Close</button>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
