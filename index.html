<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Card Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Library Card Interface</h1>

        <!-- Part 1 & 3: Card with Flip Animation -->
        <div class="card" id="library-card">
            <div class="card-inner">
                <div class="card-front">
                    <h2>Library Book</h2>
                    <p>Title: The Great Adventure</p>
                    <p>Author: Jane Doe</p>
                    <p id="availability">Availability: Checking...</p>
                    <button class="action-button" onclick="flipCard()">View Details</button>
                </div>
                <div class="card-back">
                    <h2>Book Details</h2>
                    <p>ISBN: 123-456-789</p>
                    <p>Published: 2023</p>
                    <p>Genre: Adventure</p>
                    <button class="action-button" onclick="flipCard()">Back to Front</button>
                </div>
            </div>
        </div>

        <!-- Part 3: Modal with Slide-In Animation -->
        <button class="action-button" onclick="showModal()">Show Loan Info</button>
        <div class="modal" id="modal">
            <div class="modal-content">
                <h2>Loan Information</h2>
                <p>Loan Period: 14 days</p>
                <p>Late Fee: $1/day</p>
                <button class="action-button" onclick="hideModal()">Close</button>
            </div>
        </div>

        <!-- Part 1: Loading Spinner -->
        <div class="spinner" id="spinner"></div>
        <button class="action-button" onclick="toggleSpinner()">Toggle Loading</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
