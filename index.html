<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Animations</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Interactive Animations Demo</h1>

    <!-- ===== Part 1: Button Hover Animation ===== -->
    <section>
      <h2>Animated Button</h2>
      <button class="btn">Hover Me!</button>
    </section>

    <!-- ===== Part 2: Box Animation with JS ===== -->
    <section>
      <h2>Trigger Box Animation</h2>
      <div id="box" class="box"></div>
      <button class="btn" id="animateBtn">Animate Box</button>
    </section>

    <!-- =====Part 3: Card Flip Animation ===== -->
    <section>
      <h2>Card Flip</h2>
      <div class="card" id="card">
        <div class="card-front">Front</div>
        <div class="card-back">Back</div>
      </div>
      <button class="btn" id="flipBtn">Flip Card</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
