<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS & JS Interactive Page</title>
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <header>a
        <h1>🎬 Bringing Web Pages to Life</h1>
    </header>

    <!-- Part 1: CSS Animation Demo -->
    <section>
        <h2>Part 1: CSS Animations</h2>
        <button class="animated-btn">Hover Me</button>
        <div class="box"></div>
    </section>

    <!-- Part 2 & 3: JavaScript Functions + Integration -->
    <section>
        <h2>Part 2 & 3: Functions + Interactivity</h2>
        <button id="animateBoxBtn" style="cursor: pointer; padding: 10px; border-radius: 10px;">Animate Box</button>
        <button id="toggleModalBtn" style="cursor: pointer; padding: 10px; border-radius: 10px;">Toggle Modal</button>

        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <p>This is a modal with animation!</p>
            </div>
        </div>
    </section>

    <script src="/script.js"></script>
</body>

</html>
