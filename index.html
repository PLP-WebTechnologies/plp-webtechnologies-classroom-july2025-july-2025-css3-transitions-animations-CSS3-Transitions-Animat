<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation + Functions Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>✨ CSS + JavaScript Animation Demo ✨</h1>

  <!-- Part 1: CSS Hover + Continuous Animations -->
  <button class="fancy-btn">Hover Me!</button>

  <div class="fade-box">I fade in & out 🎭</div>

  <!-- Part 2: JavaScript Functions -->
  <section>
    <h2>Function Demo</h2>
    <button onclick="showCalculation()">Run Calculation</button>
    <p id="result"></p>
  </section>

  <!-- Part 3: JS + CSS Combined -->
  <section>
    <h2>Click to Animate Box</h2>
    <button id="animateBtn">Animate Box</button>
    <div id="animateBox" class="box"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
