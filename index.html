<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS3 Transitions & JS Functions</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1> Interactive Animations Demo</h1>

  <!-- Part 1: CSS Animations -->
  <button class="btn" id="hoverBtn">Hover Me</button>
  <div class="box" id="animateBox"></div>

  <!-- Part 2: JS Functions -->
  <section>
    <h2>JavaScript Functions</h2>
    <p id="calcResult"></p>
    <button onclick="showCalculation()">Run Calculation</button>
  </section>

  <!-- Part 3: CSS + JS -->
  <section>
    <h2>Interactive Animation Trigger</h2>
    <button id="triggerBtn">Animate the Box</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
