<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS & JS Animations</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Interactive CSS & JS Demo</h1>

  <!-- Part 1: CSS3 Transitions & Animations -->
  <section id="cssAnimations">
    <h2>Hover & Keyframe Animations</h2>
    <button class="animatedBtn">Hover Me!</button>
    <div class="box"></div>
  </section>

  <!-- Part 2: JS Functions, Scope & Return -->
  <section id="jsFunctions">
    <h2>JavaScript Functions Demo</h2>
    <button id="calculateBtn">Calculate Square</button>
    <p id="calcResult"></p>
  </section>

  <!-- Part 3: Trigger CSS with JS -->
  <section id="cssWithJS">
    <h2>Trigger CSS Animation via JS</h2>
    <button id="animateBoxBtn">Animate Box</button>
    <div class="animatedBox"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
